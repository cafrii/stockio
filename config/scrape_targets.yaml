# =============================================================================
# 스크래핑 대상 정의 (Stockio)
# =============================================================================
# 증권사 API로 얻을 수 없는 시세(금, 향후 가상자산 등)를 페이지에서 추출한다.
#
# ★ 이 파일만 수정하면 코드 변경 없이 대상/URL/XPath를 갱신할 수 있다.
#   페이지 구조가 바뀌면 해당 target의 url·xpath만 고치면 된다.
#   상세 절차와 진단 방법: docs/phase2/gold_scraping_guide.md
#
# 구조:
#   defaults        : 모든 대상에 공통 적용되는 값 (target에서 개별 재정의 가능)
#   groups.<그룹>.<대상> : 그룹(자산 종류)별 대상 정의
#     url      (필수) 조회할 페이지 주소
#     xpath    (필수) 값을 추출할 XPath (브라우저 개발자도구의 "Copy XPath" 결과 사용 가능)
#     label    (선택) 사람이 읽을 이름
#     unit     (선택) 단위 표기
#     currency (선택) 통화 코드
#     timeout / user_agent / cache_ttl (선택) defaults 재정의
#     render   (선택) 조회 방식 — never | auto | always  (기본 auto)
#         never  : 정적 HTTP GET만 사용 (가장 가벼움)
#         auto   : 정적으로 먼저 시도 → 실패하면 그 대상만 headless 렌더링으로 재시도
#         always : 항상 headless 렌더링 (CSR·봇차단이 확실한 대상)
#     wait_ms  (선택) 렌더링 후 대기 시간(ms, 기본 2500)
#     wait_for (선택) 이 CSS selector가 나타날 때까지 대기 (wait_ms보다 우선)
#     render_timeout / render_user_agent (선택) 렌더링 전용 재정의
# =============================================================================

defaults:
  # HTTP 요청 제한 시간(초)
  timeout: 10
  # 조회 방식 기본값. auto = 정적 우선, 실패 시 해당 대상만 렌더링 폴백
  render: auto
  # 네이버 등 일부 사이트는 UA가 없으면 응답이 달라질 수 있어 명시한다.
  user_agent: "Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1"
  # 같은 URL 재요청을 줄이기 위한 HTML 캐시 유지 시간(초).
  # 스프레드시트의 여러 셀이 동시에 호출해도 페이지는 한 번만 가져온다.
  cache_ttl: 60

groups:
  # ---------------------------------------------------------------------------
  # 금 시세
  # ---------------------------------------------------------------------------
  gold:
    international:
      label: "국제 금 시세 (GC 뉴욕상품거래소)"
      url: "https://m.stock.naver.com/marketindex/home/metals"
      xpath: '//*[@id="content"]/div[2]/ul/li[1]/div[1]/div[1]/b'
      unit: "USD/OZS"
      currency: "USD"

    krx:
      label: "국내 금 시세 (KRX 금 현물)"
      url: "https://m.stock.naver.com/marketindex/home/metals"
      xpath: '//*[@id="content"]/div[2]/ul/li[2]/div[1]/div[1]/b'
      unit: "원/g"
      currency: "KRW"

    # 국제 금 시세 (대체 소스) — investing.com
    # 봇 차단(403)이 있어 정적 GET으로는 불가. headless 렌더링 필요.
    # 위치 기반 XPath는 렌더링 환경에 따라 DOM이 달라져 깨지므로
    # 안정적인 data-test 속성 기반 selector를 사용한다.
    international_investing:
      label: "국제 금 시세 (investing.com XAU/USD)"
      url: "https://www.investing.com/currencies/xau-usd"
      xpath: '//*[@data-test="instrument-price-last"]'
      unit: "USD/OZS"
      currency: "USD"
      render: always
      wait_for: '[data-test="instrument-price-last"]'

  # ---------------------------------------------------------------------------
  # 가상자산
  # /api/scrape?group=crypto&target=btc 로 조회된다.
  # ---------------------------------------------------------------------------
  crypto:
    # 네이버 비트코인 시세(빗썸 기준).
    # 클라이언트 사이드 렌더링이라 정적 GET으로는 값이 비어 있다
    # (구글시트 IMPORTXML에서 "가져온 콘텐츠가 비어 있습니다"가 뜨던 원인).
    btc:
      label: "비트코인 (빗썸)"
      url: "https://m.stock.naver.com/crypto/BITHUMB/BTC"
      xpath: '//*[@id="content"]/div[1]/div[1]/div/div[2]/text()'
      unit: "원"
      currency: "KRW"
      render: always

    eth:
      label: "이더리움 (빗썸2)"
      url: "https://m.stock.naver.com/crypto/BITHUMB/ETH/total"
      # xpath1: "//div[contains(@class, 'MajorInfoList_price_')]"
      # xpath2: '//*[@id="content"]/div[1]/div[1]/div/div[2]/text()'
      # <div class="DetailInfo_price___Nog_">2,742,000<span class="DetailInfo_unit__YSPlU">원</span></div>
      xpath: '//div[contains(@class, "DetailInfo_price_")]/text()'
      unit: "원"
      currency: "KRW"
      render: always
